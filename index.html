<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Datos Perdidos</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 100%; height: 200px; background: #222; color: #10b981; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 10px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; display: inline-block; text-decoration: none; }
    </style>
</head>
<body>
    <h2>🔍 Buscador de Historial Local</h2>
    <p>Si queda alguna copia de tus horas en la memoria del móvil, aparecerá en el cuadro de abajo:</p>
    
    <textarea id="consola" readonly>Buscando datos...</textarea>

    <div id="botonera"></div>

    <script>
        window.onload = function() {
            let consola = document.getElementById('consola');
            let botonera = document.getElementById('botonera');
            let registrosEncontrados = {};
            let encontrado = false;

            // Escaneamos toda la memoria local buscando cualquier formato antiguo
            for (let i = 0; i < localStorage.length; i++) {
                let clave = localStorage.key(i);
                let valor = localStorage.getItem(clave);
                
                if (clave.includes('registro_calendario') || clave.includes('fichajes') || valor.includes('entrada')) {
                    registrosEncontrados[clave] = valor;
                    encontrado = true;
                }
            }

            if (encontrado) {
                consola.value = JSON.stringify(registrosEncontrados, null, 2);
                consola.style.color = "#10b981";
                
                // Intentamos crear un botón para restablecerlo automáticamente
                let btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = "🔄 Forzar Restauración de estos Datos";
                btn.onclick = function() {
                    try {
                        for (let k in registrosEncontrados) {
                            localStorage.setItem('registro_calendario_v3', registrosEncontrados[k]);
                        }
                        alert('¡Intento de restauración completado! Vuelve a poner el código de la app para comprobarlo.');
                    } catch(e) { alert('Error al restaurar'); }
                };
                botonera.appendChild(btn);
            } else {
                consola.value = "No se ha encontrado ninguna base de datos guardada en la memoria local de este navegador.\n\nKeys actuales: " + JSON.stringify(Object.keys(localStorage));
                consola.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
