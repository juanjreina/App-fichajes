<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Horas</title>
    <!-- Iconos claros -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f2f2f7; /* Gris muy claro de fondo */
            color: #1c1c1e; /* Texto casi negro para máximo contraste */
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .contenedor {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            text-align: center;
            padding: 12px 0 4px 0;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #000000;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin-top: 2px;
        }

        /* Tarjetas en fondo BLANCO absoluto para que se vea todo */
        .tarjeta {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e5ea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .estado-actual {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e5e5ea;
        }

        .estado-etiqueta {
            font-size: 0.95rem;
            color: #555555;
            font-weight: 500;
        }

        .estado-valor {
            font-weight: 700;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 6px;
        }

        .estado-valor.dentro {
            color: #147efb; /* Azul vistoso */
            background-color: #e1f0ff;
        }

        .estado-valor.fuera {
            color: #ff3b30; /* Rojo vivo */
            background-color: #ffe5e5;
        }

        /* Números del Balance GRANDES y legibles */
        .balance-container {
            text-align: center;
            padding: 8px 0;
        }

        .balance-titulo {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #555555;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .balance-horas {
            font-size: 3rem; /* Enorme para que se vea de un vistazo */
            font-weight: 800;
        }

        .balance-horas.positivo { color: #34c759; } /* Verde éxito */
        .balance-horas.negativo { color: #ff3b30; } /* Rojo peligro */

        .sub-balances {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e5e5ea;
        }

        .sub-balance-item {
            text-align: center;
        }

        .sub-balance-item p {
            font-size: 0.85rem;
            color: #555555;
            margin-bottom: 2px;
        }

        .sub-balance-item span {
            font-weight: 700;
            font-size: 1.1rem;
            color: #000000;
        }

        /* Botones de Fichar */
        .panel-botones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-entrada { background-color: #34c759; } /* Verde claro brillante */
        .btn-salida { background-color: #ff3b30; } /* Rojo brillante */

        .btn i { font-size: 1.6rem; }

        /* Formulario Manual */
        .grupo-formulario {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .seccion-titulo {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-input label {
            font-size: 0.9rem;
            color: #333333;
            font-weight: 600;
        }

        input[type="date"], input[type="time"] {
            background-color: #ffffff;
            border: 2px solid #c7c7cc; /* Borde bien marcado */
            color: #000000;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
        }

        input[type="date"]:focus, input[type="time"]:focus {
            border-color: #007aff;
        }

        .btn-accion {
            background-color: #007aff; /* Azul estándar corporativo */
            border: none;
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 6px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            padding: 6px 0;
        }

        .checkbox-container input {
            width: 22px; /* Checkbox más grande para acertar con el dedo */
            height: 22px;
        }

        /* Lista de Historial en alto contraste */
        .lista-registros {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .registro-item {
            background-color: #f8f9fa;
            border: 1px solid #d1d1d6;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .registro-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .registro-fecha { 
            font-weight: 700; 
            font-size: 0.95rem;
            color: #000000;
        }
        
        .registro-tipo { 
            font-size: 0.9rem; 
            color: #3a3a3c;
            font-weight: 500;
        }

        .btn-eliminar {
            background: none;
            border: none;
            color: #ff3b30;
            cursor: pointer;
            padding: 8px 12px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="contenedor">
    
    <header>
        <h1><i class="fa-solid fa-clock" style="color: #007aff; margin-right: 6px;"></i>Mis Fichajes</h1>
        <p>Control Horario Personal</p>
    </header>

    <!-- TARJETA DE BALANCE TOTAL -->
    <div class="tarjeta">
        <div class="estado-actual">
            <span class="estado-etiqueta">Estado actual</span>
            <span id="estado-badge" class="estado-valor fuera">Fuera de servicio</span>
        </div>
        
        <div class="balance-container">
            <div class="balance-titulo">Balance Semanal</div>
            <div id="balance-total" class="balance-horas">00:00</div>
        </div>

        <div class="sub-balances">
            <div class="sub-balance-item">
                <p>Horas Reales</p>
                <span id="horas-reales">0.00h</span>
            </div>
            <div class="sub-balance-item">
                <p>Teórico Acumulado</p>
                <span id="horas-teoricas">0.00h</span>
            </div>
        </div>
    </div>

    <!-- BOTONES DE ACCIÓN RÁPIDA -->
    <div class="panel-botones">
        <button class="btn btn-entrada" onclick="registrarFichaje('Entrada')">
            <i class="fa-solid fa-play"></i>
            Entrada
        </button>
        <button class="btn btn-salida" onclick="registrarFichaje('Salida')">
            <i class="fa-solid fa-stop"></i>
            Salida
        </button>
    </div>

    <!-- REGISTRO MANUAL / EXCEPCIONES -->
    <div class="tarjeta">
        <div class="seccion-titulo">
            <i class="fa-solid fa-pen-to-square" style="color: #007aff;"></i>
            Añadir Registro Manual
        </div>
        
        <div class="grupo-formulario">
            <div class="control-input">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha">
            </div>
            
            <div id="inputs-tiempo-normal" style="display: flex; gap: 12px; width: 100%;">
                <div class="control-input" style="flex: 1;">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora">
                </div>
                <div class="control-input" style="flex: 1;">
                    <label for="tipo">Tipo</label>
                    <input type="hidden" id="tipo" value="Entrada">
                    <div style="display: flex; gap: 6px; margin-top: auto; height: 48px;">
                        <button type="button" id="btn-tipo-e" class="btn-accion" style="margin:0; background: #ffffff; border: 2px solid #34c759; color: #34c759" onclick="setTipoManual('Entrada')">Entrada</button>
                        <button type="button" id="btn-tipo-s" class="btn-accion" style="margin:0; background: #ffffff; border: 2px solid #666666; color: #666666" onclick="setTipoManual('Salida')">Salida</button>
                    </div>
                </div>
            </div>

            <label class="checkbox-container">
                <input type="checkbox" id="dia-especial" onchange="toggleDiaEspecial()">
                <span>Marcar como día especial (No resta)</span>
            </label>

            <button class="btn-accion" onclick="agregarManual()">
                <i class="fa-solid fa-plus"></i> Guardar en Historial
            </button>
        </div>
    </div>

    <!-- ÚLTIMOS MOVIMIENTOS -->
    <div class="tarjeta">
        <div class="seccion-titulo">
            <i class="fa-solid fa-history" style="color: #555555;"></i>
            Historial de Movimientos
        </div>
        <div id="lista-registros" class="lista-registros">
            <!-- Los elementos se inyectan dinámicamente -->
        </div>
    </div>

</div>

<script>
    const HORAS_SEMANALES_OBLIGATORIAS = 35;
    const HORAS_DIARIAS_TEORICAS = HORAS_SEMANALES_OBLIGATORIAS / 7; // 5 horas

    let registros = JSON.parse(localStorage.getItem('fichajes')) || [];
    let diasEspeciales = JSON.parse(localStorage.getItem('diasEspeciales')) || [];

    document.getElementById('fecha').valueAsDate = new Date();
    
    function setTipoManual(tipo) {
        document.getElementById('tipo').value = tipo;
        const btnE = document.getElementById('btn-tipo-e');
        const btnS = document.getElementById('btn-tipo-s');
        if(tipo === 'Entrada') {
            btnE.style.backgroundColor = '#34c759'; btnE.style.color = '#ffffff';
            btnS.style.backgroundColor = '#ffffff'; btnS.style.color = '#666666'; btnS.style.borderColor = '#666666';
        } else {
            btnS.style.backgroundColor = '#ff3b30'; btnS.style.color = '#ffffff'; btnS.style.borderColor = '#ff3b30';
            btnE.style.backgroundColor = '#ffffff'; btnE.style.color = '#34c759';
        }
    }

    function toggleDiaEspecial() {
        const esEspecial = document.getElementById('dia-especial').checked;
        document.getElementById('inputs-tiempo-normal').style.opacity = esEspecial ? '0.3' : '1';
        document.getElementById('hora').disabled = esEspecial;
    }

    function guardarYCalcular() {
        localStorage.setItem('fichajes', JSON.stringify(registros));
        localStorage.setItem('diasEspeciales', JSON.stringify(diasEspeciales));
        actualizarInterfaz();
    }

    function registrarFichaje(tipo) {
        const ahora = new Date();
        const nuevoRegistro = {
            id: Date.now(),
            fecha: ahora.toISOString().split('T')[0],
            hora: ahora.toTimeString().split(' ')[0].substring(0, 5),
            tipo: tipo
        };
        registros.push(nuevoRegistro);
        guardarYCalcular();
    }

    function agregarManual() {
        const fecha = document.getElementById('fecha').value;
        const esEspecial = document.getElementById('dia-especial').checked;

        if (!fecha) return alert('Selecciona una fecha.');

        if (esEspecial) {
            if (!diasEspeciales.includes(fecha)) {
                diasEspeciales.push(fecha);
            }
        } else {
            const hora = document.getElementById('hora').value;
            const tipo = document.getElementById('tipo').value;
            if (!hora) return alert('Selecciona una hora.');

            registros.push({
                id: Date.now(),
                fecha: fecha,
                hora: hora,
                tipo: tipo
            });
        }

        document.getElementById('hora').value = '';
        document.getElementById('dia-especial').checked = false;
        toggleDiaEspecial();
        
        guardarYCalcular();
    }

    function eliminarRegistro(id) {
        registros = registros.filter(r => r.id !== id);
        guardarYCalcular();
    }

    function eliminarDiaEspecial(fecha) {
        diasEspeciales = diasEspeciales.filter(d => d !== fecha);
        guardarYCalcular();
    }

    function actualizarInterfaz() {
        registros.sort((a, b) => new Date(`${a.fecha}T${a.hora}`) - new Date(`${b.fecha}T${b.hora}`));

        const badge = document.getElementById('estado-badge');
        if (registros.length > 0 && registros[registros.length - 1].tipo === 'Entrada') {
            badge.textContent = "Trabajando";
            badge.className = "estado-valor dentro";
        } else {
            badge.textContent = "Fuera de servicio";
            badge.className = "estado-valor fuera";
        }

        let totalMinutosTrabajados = 0;
        let mapaDiasTrabajados = new Set();
        let entradasAbiertas = {};

        registros.forEach(r => {
            mapaDiasTrabajados.add(r.fecha);
            if (r.tipo === 'Entrada') {
                if (!entradasAbiertas[r.fecha]) entradasAbiertas[r.fecha] = [];
                entradasAbiertas[r.fecha].push(new Date(`${r.fecha}T${r.hora}`));
            } else if (r.tipo === 'Salida' && entriesExist(entradasAbiertas, r.fecha)) {
                let horaEntrada = entradasAbiertas[r.fecha].shift();
                let horaSalida = new Date(`${r.fecha}T${r.hora}`);
                if (horaSalida > horaEntrada) {
                    totalMinutosTrabajados += (horaSalida - horaEntrada) / 60000;
                }
            }
        });

        function entriesExist(obj, key) { return obj[key] && obj[key].length > 0; }

        let todosLosDiasRelevantes = new Set([...mapaDiasTrabajados, ...diasEspeciales]);
        let diasQueRestanTeorico = 0;

        todosLosDiasRelevantes.forEach(fecha => {
            if (!diasEspeciales.includes(fecha)) {
                diasQueRestanTeorico++;
            }
        });

        let horasReales = totalMinutosTrabajados / 60;
        let horasTeoricasAcumuladas = diasQueRestanTeorico * HORAS_DIARIAS_TEORICAS;
        let balanceHoras = horasReales - horasTeoricasAcumuladas;

        document.getElementById('horas-reales').textContent = `${horasReales.toFixed(2)}h`;
        document.getElementById('horas-teoricas').textContent = `${horasTeoricasAcumuladas.toFixed(2)}h`;

        const balanceEl = document.getElementById('balance-total');
        let signo = balanceHoras >= 0 ? '+' : '-';
        let absHoras = Math.abs(balanceHoras);
        let minFinales = Math.round((absHoras % 1) * 60);
        let horasFinales = Math.floor(absHoras);
        
        balanceEl.textContent = `${signo}${String(horasFinales).padStart(2, '0')}:${String(minFinales).padStart(2, '0')}`;
        balanceEl.className = `balance-horas ${balanceHoras >= 0 ? 'positivo' : 'negativo'}`;

        const lista = document.getElementById('lista-registros');
        lista.innerHTML = '';

        let itemsHistorial = [];
        
        registros.forEach(r => {
            itemsHistorial.push({
                id: r.id,
                fecha: r.fecha,
                texto: `${r.tipo === 'Entrada' ? '🟢 Entrada' : '🔴 Salida'} a las ${r.hora}`,
                action: `eliminarRegistro(${r.id})`
            });
        });

        diasEspeciales.forEach(d => {
            itemsHistorial.push({
                id: d,
                fecha: d,
                texto: `⭐ Día Especial (No resta)`,
                action: `eliminarDiaEspecial('${d}')`
            });
        });

        itemsHistorial.sort((a, b) => new Date(b.fecha) - new Date(a.fecha) || b.id - a.id);

        itemsHistorial.forEach(item => {
            const div = document.createElement('div');
            div.className = 'registro-item';
            div.innerHTML = `
                <div class="registro-info">
                    <span class="registro-fecha">${formatearFecha(item.fecha)}</span>
                    <span class="registro-tipo">${item.texto}</span>
                </div>
                <button class="btn-eliminar" onclick="${item.action}">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            `;
            lista.appendChild(div);
        });
    }

    function formatearFecha(fechaStr) {
        const opciones = { weekday: 'short', day: 'numeric', month: 'short' };
        return new Date(fechaStr + 'T00:00:00').toLocaleDateString('es-ES', opciones);
    }

    actualizarInterfaz();
    setTipoManual('Entrada');
</script>

</body>
</html>
