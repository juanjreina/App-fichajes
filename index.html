<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Control de Jornada Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5988/5988246.png">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #f2f2f7;
            --accent-color: #0a84ff;
            --success-color: #30d158;
            --danger-color: #ff453a;
            --warning-color: #ff9f0a;
            --border-color: #38383a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }

        .app-header {
            width: 100%; padding-top: calc(15px + env(safe-area-inset-top)); padding-bottom: 12px;
            text-align: center; font-size: 1.1rem; font-weight: 600;
            background-color: #121212; border-bottom: 0.5px solid var(--border-color);
            position: sticky; top: 0; z-index: 10;
        }

        .container { width: 100%; max-width: 450px; box-sizing: border-box; padding: 16px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .card-global { background: linear-gradient(145deg, #1c1c1e, #2c2c2e); border: 1px solid var(--accent-color); text-align: center; }
        .date-picker-container { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        
        input[type="date"] {
            background: #2c2c2e; border: none; color: #fff; padding: 12px;
            border-radius: 10px; font-size: 1rem; flex: 1; text-align: center; font-family: inherit;
        }

        .progress-container { margin: 12px 0 4px 0; background: #2c2c2e; border-radius: 10px; overflow: hidden; height: 24px; position: relative; }
        .progress-bar { background: linear-gradient(90deg, var(--accent-color), var(--success-color)); height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.85rem; font-weight: 600; line-height: 24px; color: #fff; }

        .tramo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 0.5px solid var(--border-color); }
        .tramo-row:last-child { border-bottom: none; margin-bottom: 0; }

        input[type="time"] {
            background: #2c2c2e; border: none; color: #fff; padding: 10px;
            border-radius: 8px; font-size: 1rem; width: 90px; text-align: center; font-family: inherit;
        }

        .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px; }
        
        .btn-add {
            width: 100%; padding: 12px; background: transparent; color: var(--accent-color);
            border: 1px dashed var(--accent-color); border-radius: 10px; font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-top: 4px;
        }

        .btn-incidencia {
            width: 100%; padding: 10px; background: #2c2c2e; color: var(--warning-color);
            border: none; border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; margin-top: 8px;
        }

        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #8e8e93; margin-bottom: 12px; font-weight: 600; }
        .summary-text { display: flex; justify-content: space-between; font-size: 1rem; margin: 8px 0; }

        .thermometer-day { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 0.5px solid var(--border-color); }
        .thermometer-day:last-child { border-bottom: none; }
        .thermometer-header { display: flex; justify-content: space-between; font-weight: 500; font-size: 1rem; }
        .thermometer-tramos { font-size: 0.85rem; color: #8e8e93; margin-top: 4px; }

        .tabla-meses { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.9rem; }
        .tabla-meses th { text-align: left; color: #8e8e93; font-weight: 600; padding-bottom: 8px; border-bottom: 0.5px solid var(--border-color); }
        .tabla-meses td { padding: 10px 0; border-bottom: 0.5px solid #2c2c2e; }
        .tabla-meses tr:last-child td { border-bottom: none; }

        .backup-zone { display: flex; gap: 12px; margin-top: 20px; }
        .btn-backup { flex: 1; padding: 10px; background: var(--card-bg); color: #8e8e93; border: 0.5px solid var(--border-color); border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 500; }
        .panel-backup { display: none; background: #1c1c1e; border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; margin-top: 15px; }
        .panel-backup textarea { width: 100%; height: 90px; background: #000; color: var(--success-color); border: 0.5px solid var(--border-color); border-radius: 8px; padding: 8px; font-family: monospace; font-size: 11px; box-sizing: border-box; resize: none; margin-top: 8px; }
        .current-day-highlight { color: var(--accent-color); font-weight: 600; }
        
        .badge-incidencia {
            background-color: #483d11; color: var(--warning-color);
            padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-header">Control de Jornada</div>

<div class="container">
    <div class="card card-global">
        <div class="section-title" style="color: var(--accent-color);">Bolsa de Horas Total Acumulada</div>
        <div style="font-size: 1.8rem; font-weight: 700; margin: 4px 0;" id="saldoGlobalTotal">0:00</div>
        <div style="font-size: 0.8rem; color: #8e8e93;">Saldo neto acumulado ajustado dinámicamente</div>
    </div>

    <div class="card">
        <div class="section-title">Seleccionar Fecha</div>
        <div class="date-picker-container">
            <input type="date" id="fechaActual" onchange="cambiarFecha()">
        </div>
    </div>

    <div class="card">
        <div class="summary-text" style="margin-bottom: 12px;">
            <span class="section-title" style="margin:0;">Fichajes del día</span>
            <span id="totalDia" style="color: var(--success-color); font-weight: 600;">Total: 0h 00m</span>
        </div>
        <div id="tramosContenedor"></div>
        <div id="zonaBotonesDiarios">
            <button class="btn-add" onclick="agregarTramoVacio()">➕ Añadir Tramo</button>
            <button class="btn-incidencia" onclick="alternarIncidencia()">📅 Marcar Vacaciones / Asuntos Propios</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title" id="tituloSemana">Termómetro Semanal</div>
        
        <div class="summary-text">
            <span>Total Acumulado:</span>
            <strong id="totalSemana">0h 00m</strong>
        </div>
        <div class="summary-text">
            <span>Estado / Restante:</span>
            <strong id="estadoSemana" style="color: var(--accent-color);">0h restantes</strong>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressPct">0%</div>
        </div>

        <div id="desgloseSemanalContenedor" style="margin-top: 15px; border-top: 0.5px solid var(--border-color); padding-top: 5px;"></div>
    </div>

    <div class="card">
        <div class="section-title">Resumen Mensual Acumulado</div>
        <table class="tabla-meses">
            <thead>
                <tr>
                    <th>Mes</th>
                    <th>Fichado</th>
                    <th>Teórico</th>
                    <th>Saldo</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaMeses">
            </tbody>
        </table>
    </div>

    <div class="backup-zone">
        <button class="btn-backup" onclick="mostrarExportar()">📥 Exportar</button>
        <button class="btn-backup" onclick="mostrarImportar()">📤 Importar</button>
    </div>

    <div class="panel-backup" id="panelBackup">
        <span class="section-title" id="backupTitle">Copia de Seguridad</span>
        <textarea id="txtBackup"></textarea>
        <button class="btn-add" id="btnAccionBackup" style="margin-top:10px;" onclick="procesarAccionBackup()">Listo</button>
    </div>
</div>

<script>
    const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const mesesNombres = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    
    let baseDatos = JSON.parse(localStorage.getItem('registro_calendario_v3')) || {};
    let modoBackup = '';

    function obtenerObjetivoSemanal(fechaStr) {
        const [yyyy, mm] = fechaStr.split('-').map(Number);
        if (yyyy < 2026) return 28;
        if (yyyy === 2026 && mm < 6) return 28;
        return 35;
    }

    function formatearFechaLocalISO(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function inicializar() {
        if (!document.getElementById('fechaActual').value) {
            document.getElementById('fechaActual').value = formatearFechaLocalISO(new Date());
        }
        cargarDiaActual();
    }

    function cambiarFecha() { cargarDiaActual(); }

    function cargarDiaActual() {
        const fecha = document.getElementById('fechaActual').value;
        const contenedor = document.getElementById('tramosContenedor');
        const btnInc = document.querySelector('.btn-incidencia');
        contenedor.innerHTML = '';

        if (!baseDatos[fecha]) baseDatos[fecha] = { incidencia: false, tramos: [] };
        if (Array.isArray(baseDatos[fecha])) {
            baseDatos[fecha] = { incidencia: false, tramos: baseDatos[fecha] };
        }

        if (baseDatos[fecha].incidencia) {
            contenedor.innerHTML = '<div style="text-align:center; color:var(--warning-color); font-weight:600; padding: 15px 0;">✨ DÍA ESPECIAL COMPUTADO (0h)</div>';
            btnInc.innerText = '❌ Quitar Día Especial';
            btnInc.style.background = '#4c1d1d';
            btnInc.style.color = 'var(--danger-color)';
            document.querySelector('.btn-add').style.display = 'none';
        } else {
            btnInc.innerText = '📅 Marcar Vacaciones / Asuntos Propios';
            btnInc.style.background = '#2c2c2e';
            btnInc.style.color = 'var(--warning-color)';
            document.querySelector('.btn-add').style.display = 'block';

            const tramos = baseDatos[fecha].tramos || [];
            if (tramos.length === 0) {
                contenedor.innerHTML = '<div style="text-align:center; color:#666; font-size:0.9rem; padding: 5px 0; margin-bottom:10px;">No hay fichajes manuales este día.</div>';
            } else {
                tramos.forEach((tramo, index) => {
                    const div = document.createElement('div');
                    div.className = 'tramo-row';
                    div.innerHTML = `
                        <input type="time" value="${tramo.entrada || ''}" onchange="actualizarTramo(${index}, 'entrada', this.value)">
                        <span style="color:#8e8e93;">a</span>
                        <input type="time" value="${tramo.salida || ''}" onchange="actualizarTramo(${index}, 'salida', this.value)">
                        <button class="btn-icon" onclick="eliminarTramo(${index})">🗑️</button>
                    `;
                    contenedor.appendChild(div);
                });
            }
        }

        calcularMetricasYTermometro(fecha);
        dibujarTablaYCalcularGlobal();
    }

    function alternarIncidencia() {
        const fecha = document.getElementById('fechaActual').value;
        baseDatos[fecha].incidencia = !baseDatos[fecha].incidencia;
        if (baseDatos[fecha].incidencia) baseDatos[fecha].tramos = [];
        guardarYActualizar();
    }

    function agregarTramoVacio() {
        const fecha = document.getElementById('fechaActual').value;
        if (!baseDatos[fecha].tramos) baseDatos[fecha].tramos = [];
        baseDatos[fecha].tramos.push({ entrada: '', salida: '' });
        guardarYActualizar();
    }

    function actualizarTramo(index, tipo, valor) {
        const fecha = document.getElementById('fechaActual').value;
        baseDatos[fecha].tramos[index][tipo] = valor;
        guardarYActualizar();
    }

    function eliminarTramo(index) {
        const fecha = document.getElementById('fechaActual').value;
        baseDatos[fecha].tramos.splice(index, 1);
        guardarYActualizar();
    }

    function guardarYActualizar() {
        localStorage.setItem('registro_calendario_v3', JSON.stringify(baseDatos));
        cargarDiaActual();
    }

    function obtenerLunesSemana(fechaStr) {
        const [yyyy, mm, dd] = fechaStr.split('-').map(Number);
        const fecha = new Date(yyyy, mm - 1, dd);
        const diaSemana = fecha.getDay();
        const distanciaAlLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
        return new Date(yyyy, mm - 1, dd + distanciaAlLunes);
    }

    function obtenerMinutosEntreHoras(entrada, salida) {
        if (!entrada || !salida) return 0;
        const [hIn, mIn] = entrada.split(':').map(Number);
        const [hOut, mOut] = salida.split(':').map(Number);
        let minIn = hIn * 60 + mIn;
        let minOut = hOut * 60 + mOut;
        if (minOut < minIn) minOut += 24 * 60;
        return minOut - minIn;
    }

    function calcularMinutosDeUnDia(fechaStr) {
        const registro = baseDatos[fechaStr];
        if (!registro || registro.incidencia) return 0;
        let mins = 0;
        if (registro.tramos) {
            registro.tramos.forEach(t => mins += obtenerMinutosEntreHoras(t.entrada, t.salida));
        }
        return mins;
    }

    function calcularMetricasYTermometro(fechaSeleccionada) {
        const objSemanal = obtenerObjetivoSemanal(fechaSeleccionada);
        document.getElementById('tituloSemana').innerText = `Termómetro Semanal (Objetivo ${objSemanal}h)`;

        const minsDia = calcularMinutosDeUnDia(fechaSeleccionada);
        document.getElementById('totalDia').innerText = `Total: ${Math.floor(minsDia/60)}h ${String(minsDia%60).padStart(2,'0')}m`;

        const lunes = obtenerLunesSemana(fechaSeleccionada);
        const desgloseContenedor = document.getElementById('desgloseSemanalContenedor');
        desgloseContenedor.innerHTML = '';

        let minutosTotalesSemana = 0;
        let diaBucle = new Date(lunes);

        for (let i = 0; i < 7; i++) {
            const ISOStr = formatearFechaLocalISO(diaBucle);
            const nombreDia = nombresDias[diaBucle.getDay()];
            const esElDiaSeleccionado = (ISOStr === fechaSeleccionada);
            
            const minsEsteDia = calcularMinutosDeUnDia(ISOStr);
            minutosTotalesSemana += minsEsteDia;

            let tramosStr = 'Sin registros';
            const reg = baseDatos[ISOStr];
            if (reg && reg.incidencia) {
                tramosStr = '<span class="badge-incidencia">DÍA ESPECIAL (LIBRE)</span>';
            } else if (reg && reg.tramos && reg.tramos.length > 0) {
                let tTxt = [];
                reg.tramos.forEach(t => { if(t.entrada && t.salida) tTxt.push(`${t.entrada} a ${t.salida}`)});
                if (tTxt.length > 0) tramosStr = tTxt.join(' | ');
            }

            const hE = Math.floor(minsEsteDia / 60);
            const mE = minsEsteDia % 60;
            const tDiaStr = minsEsteDia > 0 ? `${hE}h ${String(mE).padStart(2,'0')}m` : '0h';

            const divDia = document.createElement('div');
            divDia.className = 'thermometer-day';
            divDia.innerHTML = `
                <div class="thermometer-header ${esElDiaSeleccionado ? 'current-day-highlight' : ''}">
                    <span>${nombreDia} (${diaBucle.getDate()}/${diaBucle.getMonth()+1}) ${esElDiaSeleccionado ? '📌' : ''}</span>
                    <span style="color: ${minsEsteDia > 0 ? 'var(--success-color)' : '#666'}">${tDiaStr}</span>
                </div>
                <div class="thermometer-tramos">${tramosStr}</div>
            `;
            desgloseContenedor.appendChild(divDia);
            diaBucle.setDate(diaBucle.getDate() + 1);
        }

        const hSem = Math.floor(minutosTotalesSemana / 60);
        const mSem = minutesTotalesSemana % 60;
        document.getElementById('totalSemana').innerText = `${hSem}h ${String(mSem).padStart(2,'0')}m`;

        const faltanMinutos = (objSemanal * 60) - minutosTotalesSemana;
        const estadoLabel = document.getElementById('estadoSemana');

        if (faltanMinutos > 0) {
            estadoLabel.innerText = `Faltan ${Math.floor(faltanMinutos/60)}h ${String(faltanMinutos%60).padStart(2,'0')}m`;
            estadoLabel.style.color = 'var(--accent-color)';
        } else if (faltanMinutos === 0) {
            estadoLabel.innerText = '¡Objetivo cumplido! 🎉';
            estadoLabel.style.color = 'var(--success-color)';
        } else {
            const extra = Math.abs(faltanMinutos);
            estadoLabel.innerText = `Horas Extra: +${Math.floor(extra/60)}h ${String(extra%60).padStart(2,'0')}m`;
            estadoLabel.style.color = 'var(--success-color)';
        }

        let porcentaje = ((minutosTotalesSemana / 60) / objSemanal) * 100;
        if (porcentaje > 100) porcentaje = 100;
        document.getElementById('progressBar').style.width = `${porcentaje}%`;
        document.getElementById('progressPct').innerText = `${Math.floor(porcentaje)}%`;
    }

    function dibujarTablaYCalcularGlobal() {
        const cuerpo = document.getElementById('cuerpoTablaMeses');
        cuerpo.innerHTML = '';

        // Histórico fijo e inamovible de Enero a Mayo (Clavado con tu Intranet)
        let mesesEstaticos = [
            { nombre: 'Enero',    fichado: 75*60 + 57,  teorico: 95*60 + 12,  saldo: (75*60 + 57) - (95*60 + 12) },
            { nombre: 'Febrero',  fichado: 117*60 + 5,  teorico: 112*60 + 0,  saldo: (117*60 + 5) - (112*60 + 0) },
            { nombre: 'Marzo',    fichado: 96*60 + 17,  teorico: 106*60 + 24, saldo: (96*60 + 17) - (106*60 + 24) },
            { nombre: 'Abril',    fichado: 79*60 + 2,   teorico: 95*60 + 12,  saldo: (79*60 + 2) - (95*60 + 12) },
            { nombre: 'Mayo',     fichado: 99*60 + 8,   teorico: 100*60 + 48, saldo: (99*60 + 8) - (100*60 + 48) }
        ];

        let acumuladoSaldosPasados = 0;
        mesesEstaticos.forEach(m => {
            acumuladoSaldosPasados += m.saldo;
            inyectarFilaTabla(m.nombre, m.fichado, m.teorico, m.saldo);
        });

        // CÓMPUTO DINÁMICO DE JUNIO COMPLETO HASTA EL DÍA DE HOY
        let minsFichadosJunio = 0;
        let minsTeoricosJunioHastaHoy = 0;

        // Obtenemos la fecha de hoy de forma limpia
        let hoyObjeto = new Date();
        let hoyISO = formatearFechaLocalISO(hoyObjeto);

        // Recorremos desde el día 1 de junio hasta el día de HOY inclusive
        let diaCorriente = new Date(2026, 5, 1); // 1 de Junio
        while (formatearFechaLocalISO(diaCorriente) <= hoyISO) {
            let ISO = formatearFechaLocalISO(diaCorriente);
            let dayOfWeek = diaCorriente.getDay();

            // Si es laborable (Lunes a Viernes) sumamos su teórico base de 7h SI NO es incidencia
            if (dayOfWeek >= 1 && dayOfWeek <= 5) {
                const reg = baseDatos[ISO];
                if (!reg || !reg.incidencia) {
                    minsTeoricosJunioHastaHoy += 7 * 60; // Añade 7h
                }
            }
            
            diaCorriente.setDate(diaCorriente.getDate() + 1);
        }

        // El fichado recorre todo junio para capturar cualquier tramo introducido
        for (let fechaKey in baseDatos) {
            if (fechaKey.startsWith('2026-06-')) {
                minsFichadosJunio += calcularMinutosDeUnDia(fechaKey);
            }
        }

        let saldoJunio = minsFichadosJunio - minsTeoricosJunioHastaHoy;
        inyectarFilaTabla('Junio', minsFichadosJunio, minsTeoricosJunioHastaHoy, saldoJunio);

        // BOLSA GLOBAL TOTAL ACUMULADA DESDE ENERO
        let saldoGlobalMinutos = acumuladoSaldosPasados + saldoJunio;
        const panelGlobal = document.getElementById('saldoGlobalTotal');
        
        let prefijo = '';
        if (saldoGlobalMinutos > 0) {
            prefijo = '+';
            panelGlobal.style.color = 'var(--success-color)';
        } else if (saldoGlobalMinutos < 0) {
            prefijo = '-';
            panelGlobal.style.color = 'var(--danger-color)';
        } else {
            panelGlobal.style.color = 'var(--text-color)';
        }

        let absMinutos = Math.abs(saldoGlobalMinutos);
        panelGlobal.innerText = `${prefijo}${Math.floor(absMinutos/60)}h ${String(absMinutos%60).padStart(2,'0')}m`;
    }

    function inyectarFilaTabla(nombre, f, t, dif) {
        const cuerpo = document.getElementById('cuerpoTablaMeses');
        const fStr = `${Math.floor(f/60)}:${String(f%60).padStart(2,'0')}`;
        const tStr = `${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`;
        
        let difStr = '';
        let colorDif = 'var(--text-color)';
        if (dif > 0) {
            difStr = `+${Math.floor(dif/60)}:${String(dif%60).padStart(2,'0')}`;
            colorDif = 'var(--success-color)';
        } else if (dif < 0) {
            const abs = Math.abs(dif);
            difStr = `-${Math.floor(abs/60)}:${String(abs%60).padStart(2,'0')}`;
            colorDif = 'var(--danger-color)';
        } else {
            difStr = '0:00';
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td style="font-weight:500;">${nombre}</td>
            <td>${fStr}</td>
            <td style="color:#8e8e93;">${tStr}</td>
            <td style="color:${colorDif}; font-weight:600;">${difStr}</td>
        `;
        cuerpo.appendChild(tr);
    }

    function mostrarExportar() {
        modoBackup = 'exportar';
        document.getElementById('panelBackup').style.display = 'block';
        document.getElementById('backupTitle').innerText = 'Copia generada:';
        document.getElementById('txtBackup').value = JSON.stringify(baseDatos);
        document.getElementById('btnAccionBackup').innerText = 'Entendido';
        document.getElementById('txtBackup').select();
    }

    function mostrarImportar() {
        modoBackup = 'importar';
        document.getElementById('panelBackup').style.display = 'block';
        document.getElementById('backupTitle').innerText = 'Pega la copia aquí:';
        document.getElementById('txtBackup').value = '';
        document.getElementById('btnAccionBackup').innerText = 'Restaurar Datos';
    }

    function procesarAccionBackup() {
        if (modoBackup === 'importar') {
            const texto = document.getElementById('txtBackup').value;
            if (texto) {
                try {
                    baseDatos = JSON.parse(texto);
                    localStorage.setItem('registro_calendario_v3', JSON.stringify(baseDatos));
                    inicializar();
                    alert('¡Datos sincronizados!');
                } catch(e) { alert('Error en el texto.'); }
            }
        }
        document.getElementById('panelBackup').style.display = 'none';
    }

    window.onload = inicializar;
</script>
</body>
</html>
