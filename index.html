<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Control de Jornada</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Icono para la pantalla de inicio del iPhone -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5988/5988246.png">
    
    <style>
        :root {
            --bg-color: #000000; /* Negro puro estilo iOS */
            --card-bg: #1c1c1e;  /* Gris de tarjetas nativas de Apple */
            --text-color: #f2f2f7;
            --accent-color: #0a84ff; /* Azul Apple */
            --success-color: #30d158; /* Verde Apple */
            --danger-color: #ff453a; /* Rojo Apple */
            --border-color: #38383a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Barra superior estilo App Nativa */
        .app-header {
            width: 100%;
            padding-top: calc(15px + env(safe-area-inset-top)); /* Evita el notch/isla dinámica */
            padding-bottom: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            background-color: #121212;
            border-bottom: 0.5px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .container {
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            padding: 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .date-picker-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        input[type="date"] {
            background: #2c2c2e;
            border: none;
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            flex: 1;
            text-align: center;
            font-family: inherit;
        }

        .progress-container {
            margin: 12px 0 4px 0;
            background: #2c2c2e;
            border-radius: 10px;
            overflow: hidden;
            height: 24px;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--accent-color), var(--success-color));
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 24px;
            color: #fff;
        }

        .tramo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid var(--border-color);
        }
        .tramo-row:last-child { border-bottom: none; margin-bottom: 0; }

        input[type="time"] {
            background: #2c2c2e;
            border: none;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 1rem;
            width: 90px;
            text-align: center;
            font-family: inherit;
        }

        .btn-icon { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px; }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--accent-color);
            border: 1px dashed var(--accent-color);
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 4px;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8e8e93;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .summary-text {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            margin: 8px 0;
        }

        .thermometer-day {
            display: flex;
            flex-direction: column;
            padding: 10px 0;
            border-bottom: 0.5px solid var(--border-color);
        }
        .thermometer-day:last-child { border-bottom: none; }
        
        .thermometer-header {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            font-size: 1rem;
        }
        .thermometer-tramos {
            font-size: 0.85rem;
            color: #8e8e93;
            margin-top: 4px;
        }

        .backup-zone { display: flex; gap: 12px; margin-top: 20px; }
        .btn-backup {
            flex: 1; padding: 10px; background: var(--card-bg); color: #8e8e93;
            border: 0.5px solid var(--border-color); border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 500;
        }
        
        .current-day-highlight {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Panel de seguridad integrado (Evita errores de copia) */
        .panel-backup {
            display: none;
            background: #1c1c1e;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            margin-top: 15px;
        }
        .panel-backup textarea {
            width: 100%; height: 90px; background: #000; color: var(--success-color);
            border: 0.5px solid var(--border-color); border-radius: 8px; padding: 8px;
            font-family: monospace; font-size: 11px; box-sizing: border-box; resize: none; margin-top: 8px;
        }
    </style>
</head>
<body>

<!-- Encabezado estilo iOS Nativo -->
<div class="app-header">Control de Jornada</div>

<div class="container">
    <!-- 1. GESTIÓN DEL DÍA SELECCIONADO -->
    <div class="card">
        <div class="section-title">Seleccionar Fecha</div>
        <div class="date-picker-container">
            <input type="date" id="fechaActual" onchange="cambiarFecha()">
        </div>
    </div>

    <div class="card">
        <div class="summary-text" style="margin-bottom: 12px;">
            <span class="section-title" style="margin:0;">Fichajes del día elegido</span>
            <span id="totalDia" style="color: var(--success-color); font-weight: 600;">Total: 0h 00m</span>
        </div>
        <div id="tramosContenedor"></div>
        <button class="btn-add" onclick="agregarTramoVacio()">Añadir Tramo</button>
    </div>

    <!-- 2. TERMÓMETRO SEMANAL DETALLADO -->
    <div class="card">
        <div class="section-title" id="tituloSemana">Termómetro Semanal (35h)</div>
        
        <div class="summary-text">
            <span>Total Acumulado:</span>
            <strong id="totalSemana">0h 00m</strong>
        </div>
        <div class="summary-text">
            <span>Estado / Restante:</span>
            <strong id="estadoSemana" style="color: var(--accent-color);">35h 00m restantes</strong>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressPct">0%</div>
        </div>

        <div id="desgloseSemanalContenedor" style="margin-top: 15px; border-top: 0.5px solid var(--border-color); padding-top: 5px;"></div>
    </div>

    <!-- Zona de Seguridad Avanzada -->
    <div class="backup-zone">
        <button class="btn-backup" onclick="mostrarExportar()">📥 Exportar</button>
        <button class="btn-backup" onclick="mostrarImportar()">📤 Importar</button>
    </div>

    <div class="panel-backup" id="panelBackup">
        <span class="section-title" id="backupTitle">Copia de Seguridad</span>
        <textarea id="txtBackup"></textarea>
        <button class="btn-add" id="btnAccionBackup" style="margin-top:10px;" onclick="procesarAccionBackup()">Listo</button>
    </div>
</div>

<script>
    const OBJETIVO_SEMANAL = 35;
    const nombresDias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    
    let datosV2 = localStorage.getItem('registro_calendario_v2');
    let datosV3 = localStorage.getItem('registro_calendario_v3');
    if (datosV2 && !datosV3) {
        localStorage.setItem('registro_calendario_v3', datosV2);
    }

    let baseDatos = JSON.parse(localStorage.getItem('registro_calendario_v3')) || {};
    let modoBackup = '';

    function formatearFechaLocalISO(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function establecerFechaDeHoy() {
        const hoy = new Date();
        document.getElementById('fechaActual').value = formatearFechaLocalISO(hoy);
    }

    function inicializar() {
        if (!document.getElementById('fechaActual').value) {
            establecerFechaDeHoy();
        }
        cargarDiaActual();
    }

    function cambiarFecha() {
        cargarDiaActual();
    }

    function cargarDiaActual() {
        const fecha = document.getElementById('fechaActual').value;
        const contenedor = document.getElementById('tramosContenedor');
        contenedor.innerHTML = '';

        const tramos = baseDatos[fecha] || [];

        if (tramos.length === 0) {
            contenedor.innerHTML = '<div style="text-align:center; color:#666; font-size:0.9rem; padding: 5px 0; margin-bottom:10px;">No hay fichajes manuales este día.</div>';
        } else {
            tramos.forEach((tramo, index) => {
                const div = document.createElement('div');
                div.className = 'tramo-row';
                div.innerHTML = `
                    <input type="time" value="${tramo.entrada || ''}" onchange="actualizarTramo(${index}, 'entrada', this.value)">
                    <span style="color:#8e8e93;">a</span>
                    <input type="time" value="${tramo.salida || ''}" onchange="actualizarTramo(${index}, 'salida', this.value)">
                    <button class="btn-icon" onclick="eliminarTramo(${index})">🗑️</button>
                `;
                contenedor.appendChild(div);
            });
        }

        calcularMetricasYTermometro(fecha);
    }

    function agregarTramoVacio() {
        const fecha = document.getElementById('fechaActual').value;
        if (!baseDatos[fecha]) baseDatos[fecha] = [];
        baseDatos[fecha].push({ entrada: '', salida: '' });
        guardarYActualizar();
    }

    function actualizarTramo(index, tipo, valor) {
        const fecha = document.getElementById('fechaActual').value;
        baseDatos[fecha][index][tipo] = valor;
        guardarYActualizar();
    }

    function eliminarTramo(index) {
        const fecha = document.getElementById('fechaActual').value;
        baseDatos[fecha].splice(index, 1);
        if (baseDatos[fecha].length === 0) delete baseDatos[fecha];
        guardarYActualizar();
    }

    function guardarYActualizar() {
        localStorage.setItem('registro_calendario_v3', JSON.stringify(baseDatos));
        cargarDiaActual();
    }

    function obtenerLunesYDomingo(fechaStr) {
        const [yyyy, mm, dd] = fechaStr.split('-').map(Number);
        const fecha = new Date(yyyy, mm - 1, dd);
        const diaSemana = fecha.getDay();
        const distanciaAlLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
        return new Date(yyyy, mm - 1, dd + distanciaAlLunes);
    }

    function obtenerMinutosEntreHoras(entrada, salida) {
        if (!entrada || !salida) return 0;
        const [hIn, mIn] = entrada.split(':').map(Number);
        const [hOut, mOut] = salida.split(':').map(Number);
        let minIn = hIn * 60 + mIn;
        let minOut = hOut * 60 + mOut;
        if (minOut < minIn) minOut += 24 * 60;
        return minOut - minIn;
    }

    function calcularMetricasYTermometro(fechaSeleccionada) {
        let minutosDiaSeleccionado = 0;
        if (baseDatos[fechaSeleccionada]) {
            baseDatos[fechaSeleccionada].forEach(t => {
                minutosDiaSeleccionado += obtenerMinutosEntreHoras(t.entrada, t.salida);
            });
        }
        const hDia = Math.floor(minutosDiaSeleccionado / 60);
        const mDia = minutosDiaSeleccionado % 60;
        document.getElementById('totalDia').innerText = `Total: ${hDia}h ${mDia.toString().padStart(2, '0')}m`;

        const lunes = obtenerLunesYDomingo(fechaSeleccionada);
        const desgloseContenedor = document.getElementById('desgloseSemanalContenedor');
        desgloseContenedor.innerHTML = '';

        let minutosTotalesSemana = 0;
        let diaBucle = new Date(lunes);

        for (let i = 0; i < 7; i++) {
            const ISOStr = formatearFechaLocalISO(diaBucle);
            const nombreDia = nombresDias[diaBucle.getDay()];
            const esElDiaSeleccionado = (ISOStr === fechaSeleccionada);
            
            let minutosEsteDia = 0;
            let textoTramos = [];

            if (baseDatos[ISOStr]) {
                baseDatos[ISOStr].forEach(t => {
                    const mins = obtenerMinutosEntreHoras(t.entrada, t.salida);
                    minutosEsteDia += mins;
                    if (t.entrada && t.salida) {
                        textoTramos.push(`${t.entrada} a ${t.salida}`);
                    }
                });
            }
            minutosTotalesSemana += minutosEsteDia;

            const hE = Math.floor(minutosEsteDia / 60);
            const mE = minutosEsteDia % 60;
            const tDiaStr = minutosEsteDia > 0 ? `${hE}h ${mE.toString().padStart(2, '0')}m` : '0h';
            const tramosStr = textoTramos.length > 0 ? textoTramos.join(' | ') : 'Sin registros';

            const divDia = document.createElement('div');
            divDia.className = 'thermometer-day';
            divDia.innerHTML = `
                <div class="thermometer-header ${esElDiaSeleccionado ? 'current-day-highlight' : ''}">
                    <span>${nombreDia} (${diaBucle.getDate()}/${diaBucle.getMonth()+1}) ${esElDiaSeleccionado ? '📌' : ''}</span>
                    <span style="color: ${minutosEsteDia > 0 ? 'var(--success-color)' : '#666'}">${tDiaStr}</span>
                </div>
                <div class="thermometer-tramos">${tramosStr}</div>
            `;
            desgloseContenedor.appendChild(divDia);

            diaBucle.setDate(diaBucle.getDate() + 1);
        }

        const hSem = Math.floor(minutosTotalesSemana / 60);
        const mSem = minutosTotalesSemana % 60;
        document.getElementById('totalSemana').innerText = `${hSem}h ${mSem.toString().padStart(2, '0')}m`;

        const faltanMinutos = (OBJETIVO_SEMANAL * 60) - minutosTotalesSemana;
        const estadoLabel = document.getElementById('estadoSemana');

        if (faltanMinutos > 0) {
            const hFaltan = Math.floor(faltanMinutos / 60);
            const mFaltan = faltanMinutos % 60;
            estadoLabel.innerText = `Faltan ${hFaltan}h ${mFaltan.toString().padStart(2, '0')}m`;
            estadoLabel.style.color = 'var(--accent-color)';
        } else if (faltanMinutos === 0) {
            estadoLabel.innerText = '¡Objetivo 35h cumplido! 🎉';
            estadoLabel.style.color = 'var(--success-color)';
        } else {
            const extraMinutos = Math.abs(faltanMinutos);
            const hExtra = Math.floor(extraMinutos / 60);
            const mExtra = extraMinutos % 60;
            estadoLabel.innerText = `Horas Extra: +${hExtra}h ${mExtra.toString().padStart(2, '0')}m`;
            estadoLabel.style.color = 'var(--success-color)';
        }

        let porcentaje = ((minutosTotalesSemana / 60) / OBJETIVO_SEMANAL) * 100;
        if (porcentaje > 100) porcentaje = 100;
        document.getElementById('progressBar').style.width = `${porcentaje}%`;
        document.getElementById('progressPct').innerText = `${Math.floor(porcentaje)}%`;
    }

    // NUEVAS FUNCIONES DE COPIA INTEGRADAS EN PANTALLA
    function mostrarExportar() {
        modoBackup = 'exportar';
        document.getElementById('panelBackup').style.display = 'block';
        document.getElementById('backupTitle').innerText = 'Copia generada. Cópiala desde aquí:';
        document.getElementById('txtBackup').value = JSON.stringify(baseDatos);
        document.getElementById('btnAccionBackup').innerText = 'Entendido / Cerrar';
        document.getElementById('txtBackup').select();
    }

    function mostrarImportar() {
        modoBackup = 'importar';
        document.getElementById('panelBackup').style.display = 'block';
        document.getElementById('backupTitle').innerText = 'Pega tu copia de seguridad aquí:';
        document.getElementById('txtBackup').value = '';
        document.getElementById('btnAccionBackup').innerText = 'Restaurar Datos';
    }

    function procesarAccionBackup() {
        if (modoBackup === 'importar') {
            const texto = document.getElementById('txtBackup').value;
            if (texto) {
                try {
                    const json = JSON.parse(texto);
                    if (typeof json === 'object') {
                        baseDatos = json;
                        localStorage.setItem('registro_calendario_v3', JSON.stringify(baseDatos));
                        inicializar();
                        alert('¡Datos restaurados con éxito!');
                    }
                } catch(e) { alert('Error: El texto introducido no es válido.'); }
            }
        }
        document.getElementById('panelBackup').style.display = 'none';
    }

    window.onload = inicializar;
</script>
</body>
</html>
