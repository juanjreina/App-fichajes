<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Horas</title>
    <!-- Iconos modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tipografía limpia -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-principal: #121824;
            --bg-tarjeta: #1e293b;
            --bg-entrada: #0f172a;
            --texto-primario: #f8fafc;
            --texto-secundario: #94a3b8;
            --color-primario: #3b82f6;
            --color-primario-hover: #2563eb;
            --color-exito: #10b981;
            --color-peligro: #ef4444;
            --borde: #334155;
            --radio: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-primario);
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .contenedor {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            text-align: center;
            padding: 8px 0;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--texto-secundario);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .tarjeta {
            background-color: var(--bg-tarjeta);
            border-radius: var(--radio);
            padding: 20px;
            border: 1px solid var(--borde);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* Marcador de Estado Actual */
        .estado-actual {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--borde);
        }

        .estado-etiqueta {
            font-size: 0.9rem;
            color: var(--texto-secundario);
        }

        .estado-valor {
            font-weight: 600;
            font-size: 0.95rem;
            padding: 4px 12px;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .estado-valor.dentro {
            color: var(--color-exito);
            background-color: rgba(16, 185, 129, 0.1);
        }

        .estado-valor.fuera {
            color: var(--color-peligro);
            background-color: rgba(239, 68, 68, 0.1);
        }

        /* Balance Semanal Extragrande */
        .balance-container {
            text-align: center;
            padding: 12px 0;
        }

        .balance-titulo {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--texto-secundario);
            margin-bottom: 6px;
        }

        .balance-horas {
            font-size: 2.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .balance-horas.positivo { color: var(--color-exito); }
        .balance-horas.negativo { color: var(--color-peligro); }

        .sub-balances {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 12px;
            border-radius: 8px;
        }

        .sub-balance-item {
            text-align: center;
        }

        .sub-balance-item p {
            font-size: 0.75rem;
            color: var(--texto-secundario);
            margin-bottom: 2px;
        }

        .sub-balance-item span {
            font-weight: 600;
            font-size: 1.05rem;
        }

        /* Botones Principales */
        .Panel-botones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            border: none;
            border-radius: var(--radio);
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s, background-color 0.2s;
            color: white;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-entrada { background-color: var(--color-exito); }
        .btn-entrada:hover { background-color: #059669; }

        .btn-salida { background-color: var(--color-peligro); }
        .btn-salida:hover { background-color: #dc2626; }

        .btn i { font-size: 1.4rem; }

        /* Formularios y Ajustes Manuales */
        .grupo-formulario {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .seccion-titulo {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--texto-primario);
        }

        .control-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-input label {
            font-size: 0.8rem;
            color: var(--texto-secundario);
            font-weight: 500;
        }

        input[type="date"], input[type="time"] {
            background-color: var(--bg-entrada);
            border: 1px solid var(--borde);
            color: var(--texto-primario);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--color-primario);
        }

        .btn-accion {
            background-color: var(--color-primario);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: 8px;
        }
        .btn-accion:hover { background-color: var(--color-primario-hover); }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            user-select: none;
        }

        .checkbox-container input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* Historial / Registros Recientes */
        .lista-registros {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Scrollbar fina para móviles */
        .lista-registros::-webkit-scrollbar { width: 4px; }
        .lista-registros::-webkit-scrollbar-thumb { background: var(--borde); border-radius: 4px; }

        .registro-item {
            background-color: var(--bg-entrada);
            border: 1px solid var(--borde);
            padding: 10px 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .registro-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .registro-fecha { font-weight: 500; }
        .registro-tipo { font-size: 0.75rem; color: var(--texto-secundario); }

        .btn-eliminar {
            background: none;
            border: none;
            color: var(--texto-secundario);
            cursor: pointer;
            padding: 4px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .btn-eliminar:hover { color: var(--color-peligro); }
    </style>
</head>
<body>

<div class="contenedor">
    
    <header>
        <h1><i class="fa-solid fa-clock-num" style="color: var(--color-primario); margin-right: 6px;"></i>Mis Fichajes</h1>
        <p>Control Horario Personal</p>
    </header>

    <!-- TARJETA DE BALANCE TOTAL -->
    <div class="tarjeta">
        <div class="estado-actual">
            <span class="estado-etiqueta">Estado actual</span>
            <span id="estado-badge" class="estado-valor fuera">Fuera de servicio</span>
        </div>
        
        <div class="balance-container">
            <div class="balance-titulo">Balance Semanal</div>
            <div id="balance-total" class="balance-horas">00:00</div>
        </div>

        <div class="sub-balances">
            <div class="sub-balance-item">
                <p>Horas Reales</p>
                <span id="horas-reales">0.00h</span>
            </div>
            <div class="sub-balance-item">
                <p>Teórico Acumulado</p>
                <span id="horas-teoricas" style="color: var(--texto-secundario);">0.00h</span>
            </div>
        </div>
    </div>

    <!-- BOTONES DE ACCIÓN RÁPIDA -->
    <div class="panel-botones">
        <button class="btn btn-entrada" onclick="registrarFichaje('Entrada')">
            <i class="fa-solid fa-right-to-bracket"></i>
            Entrada
        </button>
        <button class="btn btn-salida" onclick="registrarFichaje('Salida')">
            <i class="fa-solid fa-right-from-bracket"></i>
            Salida
        </button>
    </div>

    <!-- REGISTRO MANUAL / EXCEPCIONES -->
    <div class="tarjeta">
        <div class="seccion-titulo">
            <i class="fa-solid fa-calendar-plus" style="color: var(--color-primario);"></i>
            Añadir Fichaje Manual o Especial
        </div>
        
        <div class="grupo-formulario">
            <div class="control-input">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha">
            </div>
            
            <div id="inputs-tiempo-normal" style="display: flex; gap: 12px; width: 100%;">
                <div class="control-input" style="flex: 1;">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora">
                </div>
                <div class="control-input" style="flex: 1;">
                    <label for="tipo">Tipo</label>
                    <!-- Truco para usar un input estilizado o select si prefieres, mantengo el select original -->
                    <input type="hidden" id="tipo" value="Entrada">
                    <div style="display: flex; gap: 4px; margin-top: auto; height: 46px;">
                        <button type="button" id="btn-tipo-e" class="btn-accion" style="margin:0; background: var(--bg-entrada); border: 1px solid var(--borde); color: var(--color-exito)" onclick="setTipoManual('Entrada')">E</button>
                        <button type="button" id="btn-tipo-s" class="btn-accion" style="margin:0; background: var(--bg-entrada); border: 1px solid var(--borde); color: var(--texto-secundario)" onclick="setTipoManual('Salida')">S</button>
                    </div>
                </div>
            </div>

            <label class="checkbox-container">
                <input type="checkbox" id="dia-especial" onchange="toggleDiaEspecial()">
                <span>Marcar como día especial (No cuenta teórico)</span>
            </label>

            <button class="btn-accion" onclick="agregarManual()">
                <i class="fa-solid fa-plus"></i> Guardar Registro
            </button>
        </div>
    </div>

    <!-- ÚLTIMOS MOVIMIENTOS -->
    <div class="tarjeta">
        <div class="seccion-titulo">
            <i class="fa-solid fa-list-ul" style="color: var(--texto-secundario);"></i>
            Últimos Movimientos
        </div>
        <div id="lista-registros" class="lista-registros">
            <!-- Los elementos se inyectan dinámicamente -->
        </div>
    </div>

</div>

<script>
    // Configuración base de la jornada
    const HORAS_SEMANALES_OBLIGATORIAS = 35;
    const HORAS_DIARIAS_TEORICAS = HORAS_SEMANALES_OBLIGATORIAS / 7; // 5 horas

    // Cargar datos iniciales
    let registros = JSON.parse(localStorage.getItem('fichajes')) || [];
    let diasEspeciales = JSON.parse(localStorage.getItem('diasEspeciales')) || [];

    // Iniciar inputs con fecha actual por comodidad
    document.getElementById('fecha').valueAsDate = new Date();
    
    // Helper para cambiar tipo manual visualmente
    function setTipoManual(tipo) {
        document.getElementById('tipo').value = tipo;
        const btnE = document.getElementById('btn-tipo-e');
        const btnS = document.getElementById('btn-tipo-s');
        if(tipo === 'Entrada') {
            btnE.style.color = 'var(--color-exito)'; btnE.style.borderColor = 'var(--color-exito)';
            btnS.style.color = 'var(--texto-secundario)'; btnS.style.borderColor = 'var(--borde)';
        } else {
            btnS.style.color = 'var(--color-peligro)'; btnS.style.borderColor = 'var(--color-peligro)';
            btnE.style.color = 'var(--texto-secundario)'; btnE.style.borderColor = 'var(--borde)';
        }
    }

    function toggleDiaEspecial() {
        const esEspecial = document.getElementById('dia-especial').checked;
        document.getElementById('inputs-tiempo-normal').style.opacity = esEspecial ? '0.4' : '1';
        document.getElementById('hora').disabled = esEspecial;
    }

    function guardarYCalcular() {
        localStorage.setItem('fichajes', JSON.stringify(registros));
        localStorage.setItem('diasEspeciales', JSON.stringify(diasEspeciales));
        actualizarInterfaz();
    }

    function registrarFichaje(tipo) {
        const ahora = new Date();
        const nuevoRegistro = {
            id: Date.now(),
            fecha: ahora.toISOString().split('T')[0],
            hora: ahora.toTimeString().split(' ')[0].substring(0, 5),
            tipo: tipo
        };
        registros.push(nuevoRegistro);
        guardarYCalcular();
    }

    function agregarManual() {
        const fecha = document.getElementById('fecha').value;
        const esEspecial = document.getElementById('dia-especial').checked;

        if (!fecha) return alert('Por favor, selecciona una fecha.');

        if (esEspecial) {
            if (!diasEspeciales.includes(fecha)) {
                diasEspeciales.push(fecha);
            }
        } else {
            const hora = document.getElementById('hora').value;
            const tipo = document.getElementById('tipo').value;
            if (!hora) return alert('Por favor, selecciona una hora.');

            registros.push({
                id: Date.now(),
                fecha: fecha,
                hora: hora,
                tipo: tipo
            });
        }

        // Resetear form
        document.getElementById('hora').value = '';
        document.getElementById('dia-especial').checked = false;
        toggleDiaEspecial();
        
        guardarYCalcular();
    }

    function eliminarRegistro(id) {
        registros = registros.filter(r => r.id !== id);
        guardarYCalcular();
    }

    function eliminarDiaEspecial(fecha) {
        diasEspeciales = diasEspeciales.filter(d => d !== fecha);
        guardarYCalcular();
    }

    function actualizarInterfaz() {
        // Ordenar registros cronológicamente
        registros.sort((a, b) => new Date(`${a.fecha}T${a.hora}`) - new Date(`${b.fecha}T${b.hora}`));

        // 1. Calcular estado actual (¿dentro o fuera?)
        const badge = document.getElementById('estado-badge');
        if (registros.length > 0 && registros[registros.length - 1].tipo === 'Entrada') {
            badge.textContent = "Trabajando";
            badge.className = "estado-valor dentro";
        } else {
            badge.textContent = "Fuera de servicio";
            badge.className = "estado-valor fuera";
        }

        // 2. Procesar Cálculos de Tiempos
        let totalMinutosTrabajados = 0;
        let mapaDiasTrabajados = new Set();
        let entradasAbiertas = {};

        registros.forEach(r => {
            mapaDiasTrabajados.add(r.fecha);
            if (r.tipo === 'Entrada') {
                if (!entradasAbiertas[r.fecha]) entradasAbiertas[r.fecha] = [];
                entradasAbiertas[r.fecha].push(new Date(`${r.fecha}T${r.hora}`));
            } else if (r.tipo === 'Salida' && entriesExist(entradasAbiertas, r.fecha)) {
                let horaEntrada = entradasAbiertas[r.fecha].shift();
                let horaSalida = new Date(`${r.fecha}T${r.hora}`);
                if (horaSalida > horaEntrada) {
                    totalMinutosTrabajados += (horaSalida - horaEntrada) / 60000;
                }
            }
        });

        function entriesExist(obj, key) { return obj[key] && obj[key].length > 0; }

        // Unir todos los días que restan teórico (días con registros + días especiales marcados)
        let todosLosDiasRelevantes = new Set([...mapaDiasTrabajados, ...diasEspeciales]);
        let diasQueRestanTeorico = 0;

        todosLosDiasRelevantes.forEach(fecha => {
            if (!diasEspeciales.includes(fecha)) {
                diasQueRestanTeorico++;
            }
        });

        // Totales finales
        let horasReales = totalMinutosTrabajados / 60;
        let horasTeoricasAcumuladas = diasQueRestanTeorico * HORAS_DIARIAS_TEORICAS;
        let balanceHoras = horasReales - horasTeoricasAcumuladas;

        // Renderizar contadores en pantalla
        document.getElementById('horas-reales').textContent = `${horasReales.toFixed(2)}h`;
        document.getElementById('horas-teoricas').textContent = `${horasTeoricasAcumuladas.toFixed(2)}h`;

        const balanceEl = document.getElementById('balance-total');
        let signo = balanceHoras >= 0 ? '+' : '-';
        let absHoras = Math.abs(balanceHoras);
        let minFinales = Math.round((absHoras % 1) * 60);
        let horasFinales = Math.floor(absHoras);
        
        balanceEl.textContent = `${signo}${String(horasFinales).padStart(2, '0')}:${String(minFinales).padStart(2, '0')}`;
        balanceEl.className = `balance-horas ${balanceHoras >= 0 ? 'positivo' : 'negativo'}`;

        // 3. Pintar Historial Integrado (Movimientos + Días Especiales)
        const lista = document.getElementById('lista-registros');
        lista.innerHTML = '';

        // Creamos una lista unificada para visualización
        let itemsHistorial = [];
        
        registros.forEach(r => {
            itemsHistorial.push({
                id: r.id,
                fecha: r.fecha,
                texto: `${r.tipo === 'Entrada' ? '🟢 Entrada' : '🔴 Salida'} a las ${r.hora}`,
                action: `eliminarRegistro(${r.id})`
            });
        });

        diasEspeciales.forEach(d => {
            itemsHistorial.push({
                id: d,
                fecha: d,
                texto: `⭐ Día Especial (No resta teórico)`,
                action: `eliminarDiaEspecial('${d}')`
            });
        });

        // Ordenar el historial del más reciente al más antiguo para verlo mejor
        itemsHistorial.sort((a, b) => new Date(b.fecha) - new Date(a.fecha) || b.id - a.id);

        itemsHistorial.forEach(item => {
            const div = document.createElement('div');
            div.className = 'registro-item';
            div.innerHTML = `
                <div class="registro-info">
                    <span class="registro-fecha">${formatearFecha(item.fecha)}</span>
                    <span class="registro-tipo">${item.texto}</span>
                </div>
                <button class="btn-eliminar" onclick="${item.action}">
                    <i class="fa-solid fa-trash"></i>
                </button>
            `;
            lista.appendChild(div);
        });
    }

    function formatearFecha(fechaStr) {
        const opciones = { weekday: 'short', day: 'numeric', month: 'short' };
        return new Date(fechaStr + 'T00:00:00').toLocaleDateString('es-ES', opciones);
    }

    // Carga inicial
    actualizarInterfaz();
    setTipoManual('Entrada');
</script>

</body>
</html>
